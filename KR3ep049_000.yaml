body:
  text: 一女科時症門二百四方案女産後彌月形凜身熱津津汗出脈細濡數來去靡定舌紅渴飲此因營陰內虧冬令過暖溫邪襲匿於痰中相交為患治法和陽化溫清降痰氣炒桑葉青竹茹製半夏南花粉炒丹皮雲茯苓炙橘紅川石斛女寒熱互作有汗不止渴飲舌絳脈濡空軟痰吐不爽産後陰分本虧冬溫挾痰內伏營氣不與衛氣和諧若再纏綿不已恐致陰傷風動擬和陽益陰化溫除痰陽旦溫膽交加三方出入之所桂枝白芍藥竹茹半夏淡芩炙甘草枳殼橘紅薑汁炒生地女寒熱之勢已緩而仍漐漐有汗體痛偏左咳嗽痰不易出脈弦滑數冬溫兼挾痰氣阻痹肺之絡當理絡化痰宣通氣機枇杷葉細生地鉤鉤橘紅白杏仁青竹茹半夏茯苓大豆黃卷女寒熱了而不了營氣猶不和諧左脅痛引背股絡中氣血不通再議和養氣血佐以宣絡荊芥炭楂炭穀芽陳皮炙甘草茯神此方與脈案不合疑有錯誤案女經居四月脈象虛弱內熱食少腰痠腹痛膨脹營虛氣滯防其暴下虛波擬和養肝脾氣血炒鬆生地四制香附川杜仲金毛狗脊炒黑歸身白芍藥川續斷粉丹皮案女心悸頭鳴咳嗆食少作脹脈形細數素體虧弱氣火上升恐增寒熱且先清肺和胃竹茹甘草川貝六曲雲苓蛤殼杏仁鉤鉤枳殼陳皮料豆穀芽案兩脈濡數無力脾陽久虛聚濕生痰胃氣失和足浮痰多納少無寐瘧後營衛失諧元氣益虛擬和養脾胃安神化痰潞黨參甘草竹茹棗仁制於術半夏枳殼薑皮白茯苓陳皮秫米紅棗案女經居五十餘日奔走勞力動絡下血一日頗多腰痠腹支急飲食減少脈形濡數衝任營絡損傷防其腹痛暴下擬和養健脾甜於術縮砂仁厚杜仲川石斛懷山藥炒香穀芽蘇蘇梗廣陳皮川續斷案女失音半載咽乾口燥經阻兩月脈形細數陰傷肺熱恐入損途丹參杏仁竹茹牛蒡子沙參枳殼橘白抱茯神川貝桔梗甘草案咳嗽頭脹皆減耳鳴驚惕中指發麻痰多食少脈虛細弦血虛肝陽化風靜養慎調西洋參東白芍石決明茯苓制首烏川貝鉤鉤金斛料豆衣橘紅歸身案女血虛脾弱經阻半載腹痛便溏耳鳴食少脈形細澀病頗深損怯可虞也理之不易大生地赤芍藥山楂炭炒穀芽全當歸懷山藥橘皮白甘草粉丹皮紫丹參茺蔚子雲茯苓案肝氣挾痰上擾頭痛心悸痰咳嘔惡腹痛食減脈細弦數舌黃口乾病久體虛恐有痙象首烏棗仁石決明甘草料豆茯神淨鉤鉤穀芽半夏竹茹甘菊花陳皮枳殼川石斛案濕熱傷脾便血泄瀉腹膨食減舌白脈濡恐增腹滿之虛擬清脾和濕洋參秫米六曲茯苓冬朮木香陳皮大腹皮地榆砂仁豬苓澤瀉案女産後四十餘日下血如崩營傷脾弱遍體浮腫舌白便溏脈形濡細無力氣急鼻衄陰陽兩傷防喘塞泄濁虛變冬朮澤瀉赤苓皮陳皮歸身五加皮大腹皮薑炭薏米仁大紅棗女産後月餘下血如崩營傷脾弱肢體腫脹氣急便溏咳嗆舌白脈形濡細脾肺腎三焦皆病防喘塞虛波病機險重之症懷山藥廣陳皮川貝母薑皮大腹絨加皮紫石英紅棗茯苓米仁沉香屑歸身炭女産後去血過多營傷脾弱肢體浮腫咳嗽氣喘食少便溏舌白脈細三焦皆病喘塞可虞不可忽視甘枸杞炙甘草紫石英茯苓生薑皮加皮陳皮紅棗歸身炭川貝母懷山藥大腹皮沉香屑案女肝陽上擾頭暈嘔惡白帶頗多陰虛胃弱防其淹纏增重制首烏廣陳皮茯神竹茹左牡蠣料豆衣鉤鉤白芍半夏石決明金斛案女七月妊軀腿足腫脹面浮溲少脈形細濡咳嗽頭脹舌白食少脾虛濕勝防驟産虛波土炒白朮福澤瀉甜杏仁紅棗雲茯苓大腹皮川貝母甘草廣陳皮生薑皮案女寒熱較減面目黃色稍退脘痛徹背經阻兩月頭脹食少肝鬱濕熱氣血失於流暢也制香附白茯苓廣陳皮烏藥汁制茅朮六神麯淨當歸沉香汁木豬苓川芎藭綿茵陳福澤瀉赤芍藥黑山梔案女産未滿月瘀盡白帶頗多少腹痛而腰痠咳嗽食少舌白脈細營虛寒凝氣阻防其增重全當歸炮乾薑川貝母香穀芽赤芍藥山楂炭廣陳皮江枳殼厚杜仲枸杞子白茯苓炙甘草案女經後營虛肺熱音閃胃弱食少脘脹此時尚難進補竹茹穀芽橘白白桔梗金斛川貝六曲枳殼杏仁茯神案女自乳體虛伏邪留戀寒熱間兩日一發左脅背部作痛咳嗽食少脈息小弦最淹纏也柴胡生草青皮橘絡當歸身旋覆花枳殼茯苓赤芍藥新絳屑川貝蔥管案女天癸不調來則腰痠且腹與渾身骨痛近日徹夜無寐大便泄瀉頭脹牙齘開合不利心脾營虛氣滯兼有伏風防其增重毋忽歸身炭橘絡六曲湖藕中生地煨木香丹皮棗仁白芍藥桑葉山藥鉤鉤案心陰內虧衛陽外薄神倦少寐自汗不止大生地棗仁歸身於術清阿膠白芍黃耆陳皮案先形寒肢冷昏昏嗜臥而後增熱體痛胸脘痞悶此積勞陽傷風溫與濕相搏舌絳苔白將恐化而為熱且從表分達泄淡豆豉枇杷葉江枳殼連翹殼蔥頭白甜杏仁桔梗麥芽案身熱肢冷去來無定得微汗或止或不止脈數左弦舌苔白神倦囈語頭疼體痛邪兼太少兩陽若明日一候不解恐其內陷陽旦湯即桂枝湯加黃芩平旦更衣之後寒熱勢緩而脈未靜舌絳苔白溫邪挾濕蒸中不化病情尚未定著且與和解化痰以消息之溫膽湯加枇杷葉白杏仁夜來先形寒逾時而熱後熱後得汗而解脈弦數邪伏少陽陽明竟有瘧狀柴胡溫膽未知可否柴胡溫膽湯屢屢得汗熱已退解但脈沉細數舌絳苔微黃咳嗽痰不易出胸脅隱痛且與理肺和胃化痰以視明日動靜溫膽湯去半夏加枇杷葉白杏仁川貝穀芽漐漐汗出脈漸和平此時只宜和胃養陰使其神安加谷宜內經法半夏竹茹茯苓秫米橘紅炙草長流水煎多夢紛紜神倦譫語舌尖紅苔薄白脈數空弦穀食不加此乃汗解之後心陰內耗肺胃熱邪又留未盡再擬養心安神清痰熱和胃經法洋參淮麥竹茹川貝麥冬南棗茯神半夏寢食皆安脈亦和平扶正安神一定成則人參茯神淮麥麥冬橘白川斛案痰喘口渴便溏肛墜手足太陰皆虛宜補土生金五味異功散加麥冬川貝海石案素體極弱心力俱勞二氣交虛矣風溫乘襲背寒身熱心中嘈雜如飢此屬內傷而兼外感者病之輕重未定姑從溫膽湯和之溫膽湯加玉竹條案素體陰虧煩勞陽傷冬溫乘襲身熱九日咳嗆氣喘自利煩渴徹夜無寐口不仁面垢唇焦齒乾舌濁脈數濡深恐正虧邪陷當從肺胃清泄枇杷葉葛根桔梗白杏仁赤芍生甘草犀角淡芩蘆根汗出不徹熱退不淨咳嗆胸痞唇焦渴飲肺胃熱邪未清仍宜宣泄上焦桑葉川貝黃芩枇杷葉豆豉連翹殼杏仁生草蘆根案妊娠八月陡然昏厥甚至上竅血溢揚手擲足發熱神昏咬牙脈亂冬溫挾痰陷入厥陰肝陽挾胎氣上迫勢極危急無從著手不得已勉與暴厥應下之法參入熄風化痰以冀萬一白紋銀鉤藤鉤枳實汁青葶結石決明礞石滾痰丸三錢羚羊角黑山梔女又損胎既下仍然昏痙暈厥手臂強直脈弦滑數此邪痰惡血蒙閉心胞正在險津也謹防陡變羚羊角薑汁澤蘭石菖蒲橘紅楂炭竹瀝丹皮化服回生丹一粒案未老先衰勞倦感溫身熱八日熱退面青肢冷額汗津津神倦厄忒痰喘如鋸脈滑細如絲舌濁而干邪熱匿於痰中中氣交脫之象其勢不得不補然須得補耐補乃幸人參茯苓竹瀝熟地半夏薑汁麥冬橘紅紫石英得補雖安虛態不減病前遠行振動陽絡咳痰帶血最恐多溢此時又以和絡止血為急然納補之藥仍未敢撤也人參麥冬竹茹熟地川貝藕汁阿膠茯神墨汁案溫邪九日身熱不揚瞀悶不揚燥擾舌絳苔白氣喘耳聾痰咳不爽斑發紫黯隱約不出肉脈細濡數而伏此屬邪陷膻中有昏厥立危之勢急急清營透表邪達乃幸犀角二錢鬱金五分牛蒡三錢枇杷葉一兩赤芍一錢半荊芥五錢青蒿三錢川貝錢半連翹三錢蘆根三錢身微熱四肢不溫神蒙耳聾舌紅渴飲瞀悶囈語斑發不掀脈浮不出溫邪痰熱內擾蒙閉漸入心營之勢恐陡然昏痙厥閉今擬清營解表辛香開泄以冀轉機犀角連翹杏仁枇杷葉牛蒡川貝菖蒲桔梗芍藥鬱金柴胡身熱不揚昏狂叫喊囈語喃喃脈數不出煩渴引飲陽明邪火極熾仍慮昏痙厥閉再擬清營辛開甘寒化熱扶過兩候方可竹葉三錢石膏五錢生草五分麥冬二錢半犀角二錢生地七錢川貝三錢菖蒲五錢半枇杷露三錢又夜來得汗之後昏狂煩熱似定舌色亦少淡薄但大便連行而脈甚細軟神志倦怠最恐邪去未淨而正氣先虛今宜清解和胃安神養陰方生地粳米茯神石斛川貝石決明甘草麥冬竹葉又方大生地沙參川貝粉丹皮大麥冬茯神川斛石決明案溫邪蒸熱旬余斑疹發不出膚舌紅苔白大便溏泄邪伏陽明深恐里陷變喘不可忽視葛根桔梗赤芍赤苓芩連甘草連翹荷葉病情如昨泄瀉數減脈來細數而寸不出乃太陽邪熱入太陽陽明舌紅苔黑深恐昏厥犀角赤芍豆卷黃連炙草連翹青芩赤苓荷葉熱勢退緩舌紅苔濁脈數口乾陽明之邪未淨小溲短赤是濕熱癃閉州都所致犀角連翹滑石竹葉丹皮草梢赤苓川柏案滋陰清熱香犀尖丹皮麥冬川石斛細生地連翹茯神案溫病八日身熱不揚脈左空弦右模糊膺悶厄忒面赤如醉舌紅苔白邪熱苔白痰濕混阻其勢頗危旋覆花鬱金杏仁竹瀝枇杷葉川貝豆卷薑汁大戰一晝夜邪熱勢猛幾危屢次幸而膚黃斑透得解轉致咽喉微痛頰車失開舌絳口乾面油目昏脈數左弦乃陽明之經猶熱少陽之氣內虧濕反化燥之時猶恐泛而復聚今當清營滋化理咽除痰不致再生更張乃吉犀角地黃湯加連翹川貝竹茹桔梗人中黃頰車失張咽嗌哽痛少陰自虛陽明尚未清肅滋養少陰之中少佐清泄元參甘草金斛葛花生地桔梗川貝雞距子案身熱不揚氣逆咳嗽痰中映紅脈數左細軟右浮滑冬令過暖溫邪蘊伏肺中嗆傷營絡恐增喘急陰分本虧只宜輕濟清泄慎勿辛溫發散葦莖湯加藕肉川貝蜜炙枇杷葉案身微熱畏風惡寒瞀悶氣喘體痛右甚脈浮滑數勞倦感邪氣痹不宣恐其厥逆蘇子豆豉前胡桑皮枳殼杏仁桔梗川朴蔥白案肝氣挾痰塞逆心脘掣痛陡然寒顫壯熱痙厥洊至汗出如雨膚冷如石脈細如髮語言不出是痰邪內伏肝風鴟張正氣欲脫危如朝露無可奈何勉擬扶正滌痰回陽救逆以冀萬一人參龍骨半夏竹瀝附子牡蠣橘紅薑汁案冬溫九日身熱不揚神煩瞀悶脈數不暢舌紅苔黃手腕搐搦痰邪內伏肝風欲動恐其復厥豆豉半夏連翹桔梗蔥白橘紅杏仁案冬溫內伏陽虛胸痹其病不輕瓜蔞皮桂枝枳殼茯苓薤白半夏川朴黃芩案冬溫咳嗆挾食壯熱咳嗆其勢極險蘇子杏仁象貝萊蔔汁前胡桔梗連翹桑葉枳殼蘆根案形寒身熱面赤戴陽嘔惡舌濁脈沉細少腹拘急終宵不寐氣上衝心高年濕熱內盛冬溫深入厥少其勢危篤勉與仲聖厥陰治法川連桂木細辛川柏乾薑黨參附子歸身烏梅案病後熱留營中更兼喪明之痛犀角地黃湯加川貝萱花案脈浮頭項強而惡寒此太陽病也病後陰虛宜兼滋養桂枝湯即陽旦湯加黃芩再加生地即陽旦湯加生地案外受風寒內傷酒醴濕熱蘇子枇杷葉橘紅茯苓杏仁米仁桔梗桑皮案煩勞耗陰冬溫伏邪沙參麥冬海石川貝玉竹蛤殼米仁梨皮案濕熱肝氣內郁風寒外遏心中懊憹不食目黃舌絳唇乾脈不通暢治當疏達柴胡黑梔神麯青皮麥芽茵陳香附連翹豆豉案冬溫搐肺金實則啞蘇子桑皮川貝活水蘆根杏仁前胡桔梗生瓜子殼案冬溫伏胃蒸熱膚黃嘔吐拒納藿香梗茵陳茯苓連翹宋半夏陳皮黃芩神麯案此大頭天行毒也若毒邪內攻則昏亂何小視之耶普濟消毒飲案陰虛感溫肝陽上逆溫膽湯加金石斛石決明案失血損體勞煩感溫防其新邪舊病因時病併發葦莖湯加南沙參象貝湖藕案風寒壅遏食滯停積肝氣上逆寒熱昏躁胸悶脈伏勢將昏痙厥閉若此重症如何來此就醫勉擬方速載歸而勿再來也黑山梔枳實連翹桔梗淡豆豉麥芽杏仁鬱金案冬溫夾食來勢不輕豆豉茵陳蘇梗杏仁山梔連翹川朴枳殼案肢冷身熱煩躁呻吟脈沉數冬溫食滯阻中暴寒外遏其勢棘手葛根淡芩連翹麥芽柴胡石膏甘草枳實案肝氣內郁風寒外遏豆豉枳殼半夏萊蔔子黑梔杏仁生薑蔥白橘紅案女産後營虛溫邪乘襲寒熱匝月咳嗆氣短腹膨脈細神倦恐其邪正兩脫至險至險勉擬一方桑葉楂炭丹皮茯苓玉竹陳皮歸身穀芽案冬溫身熱旬余勢將陰傷風動青蒿連翹枳殼桑葉黃芩竹葉麥芽蘆根案冬溫九日形凜身熱脈細數舌絳苔白陰虧不能運泄將恐邪陷昏憒豆豉枳殼麥芽桑葉山梔杏仁連翹蘆根身熱夜重自利渴飲舌絳苔黃脈細嘔惡不食陰虧之體冬溫內伏防其昏陷葛根芩連湯加神麯柴胡赤苓穀芽案冬溫傷肺咳嗆痰血喘不得臥其險極桑葉南沙參石膏生甘草杏仁枇杷葉麥冬高年積勞陽傷冬溫入伏咳嗆氣短正不克邪之象豆豉蘇子橘紅蔥白杏仁半夏冬溫之病辛燥頻進肺胃受傷木火上逆咳嗆痰濁嘔吐拒納理之極難竹茹甜杏仁米仁瓜子橘白川貝母茯苓稻須下虛之體冬溫重感身熱痰嗽喘不能臥反復淹纏極難用藥葦莖湯加枇杷葉桑皮蛤殼川貝案身熱旬余微汗不解脈細數不出舌絳苔黃渴飲便閉溫邪夾食也恐其內陷轉重小陷胸湯加山梔豆豉連翹生穀芽案冬溫八日瞀悶脈伏邪食並重恐其內陷蔥白川朴枳殼秦艽豆豉杏仁桔梗麥芽案積勞陽傷營衛不和或寒或熱桂枝湯加當歸陳皮茯苓熱退不淨咳嗆嘔吐脈弦而數寐則囈語肝膽之陽挾溫邪而上升也溫膽湯去甘草加青蒿黃芩生薑冬溫伏邪營衛不和陽旦湯加杏仁案濕熱痰食混中焦正不敵邪則內結外脫川連橘紅羚羊角黃芩生草連翹鉤鉤葛根麥芽熱退未淨防其復盛前方去羚羊角麥芽加神麯案身熱不揚遍體浮腫脈緊舌黃口乾咽哽胸悶冬溫內伏嚴寒外遏肺不清達最恐喘急不是小病麻杏石甘湯案身熱去來靡定得汗解而旋覆燥渴引飲舌白中濁脈濡數不食不寐此暑風濕熱混蒸陽明太陽居素交虛惟恐里走或得轉而為瘧乃幸藿香半夏神麯石決明川朴陳皮茯苓鮮荷葉夜來熱退不淨神煩無寐脈數軟舌乾微黃暑熱蘊伏惟恐復熱擬從肺胃達泄枇杷葉半夏茯苓荷葉白杏仁橘紅竹茹果然復熱昏譫鼻衄煩渴引飲脈數不暢舌紅苔白小溲短赤煩躁無寐暑傷心寒傷氣肺胃邪火鴟張惟恐陰傷風動已屆一候病情未定今擬清解達泄冀其轉瘧如何山梔連翹羚羊角杏仁豆豉竹葉枇杷葉蘆根熱緩不退脈細數不出舌紅苔黃鼻衄盈盞煩渴引飲徹夜無寐暑熱深伏陽明營分將恐熱迫陰傷當清營滋泄得轉疸瘧乃幸仍不可泛視也犀角連翹知母地黃竹葉貝母淡豆豉蘆茅根西瓜翠衣夜來熱甚神昏平旦醒而熱退不淨似乎瘧象而未準者但症陽脈陰深恐正不勝邪轉虛迅速頗難立法擬清氣熱和胃陰法洋參花粉半夏粳米麥冬甘草竹葉頭額常熱身肢卻有退時疸瘧之象今日之來冀其輕緩不致昏憒譫語庶無內陷之虞仍擬清熱和陰洋參半夏竹葉麥冬粳米花粉生草青蒿蘆根昨午表熱不壯而自覺心中甚熱陽亢陰虧所致脈象模糊神煩無寐額熱不退舌心剝落口苦吞酸陽明濕熱不化心肝氣火內盛必須耐性以調之如躁急心熱更張或多失仍擬扶正養陰和胃安神以消息之洋參半夏茯神麥冬竹茹青蒿生草橘白稻葉暑濕痰熱混蒸三焦似轉瘧而去來靡定朦朧將睡時囈語喃喃肢搐身瞤神憒耳聾不聰此屬臟陰內虧痰火蒙閉風陽竊動尚慮變幻多端急當扶正安神熄風化痰不致虛波陡起乃幸洋參石決明羚羊角竹茹大生地麥冬連翹茯神鉤鉤橘紅身涼額亦不熱脈象稍出左弦右空舌苔膩白暑濕若有未楚者然尚慮散而復聚煩渴漸減正亦漸弱宜未雨綢繆勿使虛態畢集黨參麥冬石決鮮蓮子生地茯神橘紅生穀芽昨身熱至曉退解脈左弦右數舌紅苔白究是暑濕伏於陽明而為疸瘧扶正安神化痰清熱一定成則黨參陳皮茯神麥冬竹葉石決半夏穀芽鮮蓮子昨瘧之象雖不重而熱退汗出津津口苦咽乾心恍體倦二氣漸露虛象必當扶正養陰以化餘邪參鬚中生地金斛半夏麥冬肥知母茯神橘紅昨發瘧得汗而解茲診其脈仍依舊弦數得毋欲變日至乎仍與扶正養陰化痰和胃洋參金斛橘紅麥冬茯苓石決明知母蓮子稻葉熱甚而長退時汗少口乾舌紅脈數空弦肺胃之邪尚蘊心腎之陰已耗急宜壯水以制陽光鹹苦入陰法生地貝母橘白蓮子天冬花粉茯苓知母連翹沙參此方與案不合小補之後余焰復烈疸瘧發熱三日不分界限不易外達也滋清之中復兼利濕消暑青蒿骨皮連翹鱉甲大生地荷葉知母六一散鮮佛手忽涼忽熱汗出不徹舌轉濁白脈數不暢究是熱蒸濕蘊清滋養陰之中兼滲三焦分利青蒿地骨皮荷葉鱉甲斛藿鮮佛手知母六一散神麯暑濕交蒸熱不退解汗出不徹已屆秋令性天先生主以喻氏頗合病機增損為治性天即薛公望冬桑葉杏仁阿膠知母枇杷葉石膏麥冬川貝附薛性天案熱自里發值於暑濕交蒸之時且奪精於病前今為期三候寒熱不定多於申酉之間脈靜脈大則身和脈大則身熱最易液涸風動昨熱盡退茲診脈仍數額微熱口苦耳聾悉屬少陽陽明見症暑濕未能盡化而陰氣孤絶陽氣獨發也與仲景方清氣熱養胃陰竹葉石膏湯加沙參桑葉丹皮案暑為陽邪心為離火暑先入心汗乃心液暑病三候之外君主焉有不虧之理擬加生白芍錢半與性天先生同議參葉茯神半夏秫米麥冬甘草橘紅鮮蓮案大清大涼之後脾胃焉有不虧之理和脾胃專務參朮恐其太早若再清涼更苦脾溏曷若微清微涼則兩得其平矣人參葉橘紅麥冬鮮蓮子絲瓜葉茯苓穀芽半夏甘草生白芍案少陰之脈循喉嚨挾舌本兼茲以里邪兼發又被暑濕交蒸疊進清解暑濕退熱邪之流弊未楚是以咽痛嗌乾脈不數而少納四肢清涼也擬少陰立法百合雞子清蛤殼元參女貞子麥冬清阿膠旱蓮草貝母咽紅腫痛蒂舌下墜口咽皆干舌紅苔糙中心剝落暑濕大病之後心腎真陰耗散孤陽上僭法當救陰潛陽壯水制火同性天先生議大生地白芍知母淡天冬龜板淡元參真阿膠淡秋石雞子黃案七夕表熱已解而轉增咽哽阻咽咳嗆痰稠脈數右大少陰本虧真陽上燔鹹苦滋救仲景成法也公議方雞子黃連阿膠湯豬膚湯復診昨方加知母咽痛未定身涼復熱不但陰虧火炎猶有暑濕餘氣時散時聚今議養陰利濕使從小便而出豬苓湯三豆湯代茶咽痛漸平大便頻泄少腹急痛舌苔灰白暑濕餘邪挾食滯困中恐其由瘧變痢宜從陽明開提泄熱仍佐兼顧少陰葛根芩連湯洋參阿膠白芍佛手熱不復來利亦減緩惟舌本絳而苔花搭脈右甚數肺胃餘熱未清心腎之陰頗虧此時尚須清肺和胃滋養心腎為善後之計麥冬阿膠黃芩佛手川斛白芍炙草蓮子諸恙漸平惟穀味寡納寤言不寐左寸關不靜今當靜心安神和胃養陰務祈怡神靜養不致再生更張乃吉洋參茯神炙草麥冬石決明穀芽棗仁宋半夏阿膠倦怠不嗜食寤寐紛紜脈細軟數皆屬邪去正虛心陰內虧之故擬安神補心和胃養陰然後再商峻補黨參阿膠秫米生地半夏木瓜麥冬牡蠣茯神形神色脈悉屬轉虛必須扶正養陰參鬚牡蠣茯神阿膠半夏秫米大生地麥冬木瓜此方與前方同邪去正虧當以滋補慎寒暖節飲食勿使功虧一簣人參蓯蓉茯神懷山藥熟地萸肉麥冬新會皮案夜來小便寤寐不安口乾舌燥背脊轟熱脈數右大皆繫心腎內虧陽亢陰虛權宜攝陰潛陽人參龜板山藥海參熟地牡蠣白芍天冬茯神陳皮此案諸方悉屬有本而來惟當用清燥救肺之際補劑略早一步是以其熱反復淹留不退也歷觀前案自明案深秋涼風觸動暑濕伏邪初起間日疸瘧已屬陽明見症爾來熱無定時脈空數兩關獨大尺短舌絳邊碎口糜氣穢咽哽塞胃中邪熱內蒸陰液日漸告涸不但慮其病久正脫抑恐毒氣內陷則胃敗不食姑擬徹熱救陰清胃解毒之法以消息病機黃連生地人中黃川貝黃芩阿膠川石斛銀花平旦潮熱又發燥而渴飲胸痞氣粗口糜氣穢鼻癢舌乾脈數悉屬肺胃蘊熱陰液內涸之象喻西昌為的對之方但其熱勢猖狂深恐鞭長莫及清燥救肺湯用參鬚人中黃去麻仁連進苦泄滋陰甘寒化熱津液不回神識模糊脈數無力邪熱匿於痰中蒙閉心營正氣不得振托明日三候陡然昏厥將何料理不忍束手竭蹶擬方以冀弋獲犀角麥冬知母生地石膏石決明人參川貝竹瀝夜來得微汗神醒而倦怠懶言脈右弦數唇仍干身熱暫解目前之急痰邪終未能出慮其明日復然治法不外清營化痰公議方損益犀角麥冬石決明竹瀝生地石膏川貝母蘆根人參知母霍斛晚診更衣不暢渴飲脈數邪火之勢未衰也胃中津液大虧若明晨忽然風動將何以御之此時滋清熄風之外無他道也羚羊角麥冬川貝燈心石決明蘆根南沙參生地霍斛竹葉病情如昨脈象稍遜寤言不寐邪熱逗留不去正氣日漸消除磨假使今晚復熱豈不大費躊躇也乎公議清陰中之熱和膽胃之熱生地麥冬川貝竹茹鱉甲石決明橘白花粉川斛丹皮晚診熱不復發固屬轉機然脈軟少神更衣怯力口乾舌蹇陰液頗虧伏熱不清怕其驟虛口疳糜爛責在專司滋陰和胃以熄余焰生地川斛丹皮橘白麥冬川貝茯神稻須脈形雖軟病情未減即古云難成而易虧者陰氣也口糜不除胃中自覺熱氣上升乃余焰未熄宗前法滋陰清化和胃生津生地茯神稻須甘蔗汁丹皮川斛麥冬石決明晚診諸症仍若毋庸多贅惟似寐非寐醒則喉間咳嗆足見肺胃陰液不能上供本擬再用滋劑因未及一晝夜藥已兩進恐藥力過病擬用色白味甘性潤者扶助胃氣清泄肺胃而已沙參冬瓜子通草麥冬川斛蘆根川貝茯苓又診得右關獨大喉間作痛嗌乾二便時難知飢少納此皆陰液少於涵養水火有亢炎之勢急請專司調治以免蔓延宗前法復入咸降之品生地麥冬料豆衣天冬桔梗緑豆衣川斛生草淡秋石交今日來大便三次便後氣粗神倦寐則眼睛露白漸次有諸虛之象擬用三才加味一以攝納正氣一以靜攝肝陽頻頻灌溉庶幾免太過不及之象人參天冬川斛淮麥生地石決明茯神南棗夜來又作潮熱熱時神蒙幸喜為刻無多脈形仍數翻覆不已究屬餘邪留戀擬清骨散以搜剔之佐以清胃生地骨皮知母川斛鱉甲丹皮麥冬草梢案間日瘧停久倏又往來潮熱病情變幻多端究是此熱不泄津液不復口出熱氣穢濁前議胃中有熱間可畏也仍與滋陰潤燥宣上徹下使從小便而出沙參天冬丹皮桔梗生地茯苓澤瀉生草案脈數左關弦右關大蒸蒸潮熱莫往莫來邪誠在陽明若云不涉少陽者恐未必然也然病久陰液已涸豈僅和解可溉自應清滋化熱少佐宣達亦迎其機而導之之法也生地丹皮青蒿子茯苓鱉甲骨皮川石斛澤瀉潮熱兩度退而不盡渴飲舌乾脈弦數暫停滋膩獨取陽明蘆根川貝青蒿子花粉骨皮白粳米案漐漐汗出且發白疹莫非伏邪外達然神倦脈軟口穢舌乾邪熱未去正氣已虛最恐陡然轉虛成敗未卜也用和胃養陰扶正化邪法沙參麥冬茯神穀芽生地玉竹石決明白疹未暢旋即退收邪終未泄繼而復熱氣粗鼻掀肺虛火盛不克宣降恐其熱勢復烈擬用錢仲陽法復入清通之品補肺阿膠湯加蘆根佛手熱退脈小緩熱來則數大此邪之聚散也舌苔稍潤渴飲溺赤斑發未艾清滋解泄一定成則昨宵法合當繼之照昨方絡續得汗可知邪未復聚所以潮熱不來舌雖潤紅而有裂紋肺胃之陰殊難恢復專以清之化之沙參玉竹麥冬茯苓生地川斛橘白穀芽身涼脈靜不比昨日其邪若有未淨者然養陰和胃為主清泄少陽為佐生地玉竹茯苓桑葉麥冬川斛橘白丹皮案舌紅裂紋渴飲上猶燥也而腹鳴溺赤口疳復生濕熱蓄於中下今當滋上分下川斛阿膠丹皮澤瀉麥冬沙參茯苓淡竹葉案舌不幹而口乾胃中津液虧也仍舊滋陰和胃以化之沙參阿膠麥冬人中白生地石斛丹皮穀芽案病已逾月舌紅苔黃脈數關大渴飲溲赤痰濁口膩不更衣者六日雖未可云腑實而陽明之熱究屬未清須得便通之後舌淡脈靜方可填納然乎否乎方未録濕溫病後飲食不節復熱十餘日戰汗不解遍體紅紫藍斑密布齒衄成流脈芤澀濕溫熱毒深傷陽明營分血得熱而沸騰也勢極危篤犀角汁石膏湯磨板藍汁金汁羚羊角汁石膏湯磨方諸水茅根汁鮮生地汁藕汁銀花露復診照前方去羚羊角加生軍汁大便連行熱甚不解若不進谷胃氣內憊終難成功也犀角丹皮生石膏生地洋參明玳瑁茅根人中黃板藍根復診前方去玳瑁石膏加藿香鮮蓮子穀食漸進身熱漸緩皆是邪毒化解之機然其斑如玳瑁者未能轉色尚在險途擬清營解毒茅根三豆湯代茗犀角地黃湯加西洋參人中黃板藍根案暑風濕熱夾痰食交蒸十六日不得汗解神志昏蒙唇腫舌強脈沉滑數邪結膜膈漸入心營大勢棘手勉擬清營泄熱開竅豁痰以冀萬一犀角薄荷豆豉竹瀝山梔連翹鮮地菖蒲汁竹葉淡芩另用紫雪丹五分竹葉湯送下先服案咳嗆不爽至圊不便邪食阻踞膜膈有昏閉危厥之勢勉擬背城借一涼膈散拆寫竹葉薄荷葉黃芩元明粉連翹生草生軍桑皮枇杷葉黑梔案濕溫疫邪九日神呆脈伏斑點模糊內陷之象其勢棘手犀角連翹檳榔菖蒲汁牛蒡草果鬱金知母半夏赤芍必得斑隨汗化方有希冀犀角竹葉杏仁赤芍鬱金桔梗連翹川貝豆卷痰食內閉尚未坦途犀角鬱金連翹黑膏菖蒲山梔赤芍川連天竺黃案暑濕疫邪互蒸病初起有汗表氣外泄則穢氣入走營分發見斑疹氣弱不克振托所以隱躍不出肉清營熱開手經一定之理否則內陷昏閉犀角連翹竹心枇杷葉牛蒡鬱金桔梗蘆根豆卷川貝病情如昨而斑疹仍不掀發以致風動大便瘕泄又不可滋膩頗難著手今擬清營解肌佐以開提氣分必期化汗而解方幸犀角赤芍豆卷稻葉牛蒡鬱金橘紅連翹桔梗荷葉退而復熱脈芤舌絳陰陽邪復伏若至兩候不解勢必內陷風動青蒿犀角杏仁荷葉黃芩連翹佛手西瓜翠衣豆卷外用七葉湯揩洗易去衣單案壯熱氣喘頭汗如蒸籠水脈數不暢暑濕熱三氣蒸蘊陽明太陽恐其昏厥小陷胸合蒼朮白虎湯案女身熱十九日乍重乍輕既汗既下熱仍不退神志恍惚手肢搐搦脈數模糊此屬暑濕熱三氣交蒸産後營虛不克振拓以致熱甚生風液虧成痙頗難立法勉擬一方羚羊角丹皮鉤鉤中生地石決明茯神桑葉花粉蓮子案身熱不揚忽輕忽重濈然汗出舌紅苔黃目赤面垢脈右軟左弦渴不多飲嘔惡吞酸初起胸滿引背繼發疹點少陽而兼陽明也神倦聲少兩候之內不致虛波陡起乃幸黃連溫膽湯加枇杷葉黃芩青蒿稻根案胸痞厄忒面赤戴陽肢冷自汗脈軟尺空暑濕內閉陰濁上干陽氣外脫生脈八味極當僭擬白通繼進人參乾薑豬膽汁白童便附子蔥白服白通湯後脈得微續可否繼進暑濕內燔陽氣外脫其勢危急甘露飲深合病機以此背城借一桂枝人參於術寒水石石膏茯苓澤瀉麥冬案瘧來厄忒煩冤瞀悶躁擾退則汗出膚冷神憊脈微此正不敵邪若今夕再來恐其虛脫姑與攝納亦既竭吾才欲罷不能也生脈散加熟地牡蠣茯神烏梅肉復診前方加炙草附子案脾虛肝鬱腹脹膨滿非指日可愈而又寒熱如瘧乃感近日之風溫邪與濕交蒸也恰在陰陽交替之時深恐更張或多勉與內經木鬱達之之法逍遙散加黃芩山梔丹皮案溫濕交蒸身熱有汗不解腹膨滿脅腹泄全不思谷脈細而數肝腎內傷大勢棘手若曰播逃則我不敢勉擬培中泄熱於術白芍神麯川連炙草澤瀉案暑濕傷氣體倦脈軟煨葛根歸身澤瀉真茅朮川柏陳皮麥冬神麯甘草案陽微之體陰暑內侵不可清涼不可發表消暑丸每日四錢鮮蓮子湯送下案暑濕熱三氣傷中身熱體楚喘咳自汗其勢極重葛根芩連湯加茯苓荷梗案女産後腹痛偏右虛中有瘀身熱咳嗆音啞脈數兼夾客感防其內陷昏憒此亦女科套方桑葉澤蘭細生地丹參荊芥楂炭益母草全歸身案暑濕熱三氣交蒸身熱脈數煩渴溲赤匝月不已恐其轉重甘露飲去寒水石加橘皮半夏案暑熱伏胃陽氣不通桂枝白虎湯加蔻仁案暑濕食滯混阻中焦此則通套病通套方藿梗川連枳實神麯香薷川朴麥芽連翹案暑濕熱食混阻膜原形浮色黃腹脹起塊其勢極重深恐變遷茅朮草果茯苓神麯川朴淡芩陳皮茵陳檳榔案陰分本虧暑濕伏邪觸動深秋涼風而發寒熱不能成瘧舌紅苔黃脈濡煩渴咳嗆噁心鼻衄邪火甚熾恐其內陷風動不可泛視擬喻西昌法清燥救肺湯去阿膠案陽微濕勝之體夏病纏綿未復將交寒露寒熱復作二便失司脘痞厄忒自汗鼻冷神疲脈微中下無陽陰霾痰濁混阻上干形神色脈無一不脫兼不進穀食將何恃而不恐擬扶正通陽滌痰泄濁以冀弋獲人參一錢丁香三隻乾薑七分橘紅七分附子錢半柿蒂三個肉桂五分半夏錢半案暑濕熱食困中草果黃芩赤苓檳榔神麯澤瀉川朴麥芽茵陳案因食而復恐其轉重宗仲聖法枳實梔豉湯案前已回謝云何又來竹葉枳殼半夏石膏桔梗蔻仁案邪陷陰涸恐其昏脫竹葉石膏湯用黨參案暑濕阻痹氣機強迫其汗無益青蒿枳殼半夏蔻仁黃芩桔梗茯苓案熱緩汗多額脹面垢舌黃濕熱蒸中上干為熱山梔青蒿茯苓連翹豆豉淡芩滑石茵陳蒿案久病之體暑濕浸淫理之極難半夏醋炒金斛穀芽黃芩蔻末佩蘭案陰虛濕熱浸漬極為棘手黃連阿膠湯加豬苓案伏暑秋燥纏有二十四日身熱煩渴咳喘嘔穢陰液已涸最恐風動急與喻西昌法清燥救肺湯秋燥傷及肺絡咳嗽失血近則恐驚遠則恐癆清燥救肺湯用砂仁去阿膠麻仁案伏邪晚發寒熱如瘧最怕昏陷柴胡川連半夏滑石黃芩川朴蔻仁赤苓案失血損體伏邪晚發熱解肢冷汗出厄忒脈微細虛波不測最防其脫救逆湯加黨參熟地伏邪晚發似瘧似痢舌絳苔干脈細數日中少安夜多煩躁陰傷已極正氣不支最恐虛脫扶正救陰泄熱一定成則舍此之外無他道也人參阿膠黃連生草生地麥冬白芍雞子黃案暑濕伏邪發在秋冬之交寒熱嘔吐其勢方張當用苦辛開達不可升散溫膽湯去甘草加川連生薑若不進谷終恐其脫前診回絶云何頻來竹葉石膏湯案體倦膚黃足軟舌白脈遲而空中下陽微暑濕內困當與扶陽理濕六君子湯去人參加乾薑附子米仁案女小産之後下血過多暑濕熱邪內蘊遍體浮腫微熱咳嗆頭脹脈數口乾舌苔白膩虛中有熱恐成蓐癆桑葉杏仁生地通草丹皮米仁歸身紫菀桔梗橘紅案伏邪初秋即發類乎疸瘧序將入冬熱不了了口淡食少乾咳氣短脈空數舌絳苔白正氣受伐而虛熱仍伏肺胃只宜輕劑化解若恣意疏散藥過病所矣仿孫真人法葦莖湯加桑葉枇杷葉麥冬川斛梨肉伏邪不清痰濕困中二陳湯去甘草加草果檳榔川朴知母神麯案伏邪恰髮霜降表熱不壯心中煩灼如焚舌絳渴飲脈空數陰液被劫勢將風動昏厥此非人力所能為也擬兼顧沙參霍斛連翹生草生地花粉竹葉麥冬案伏邪發在秋初身熱屢汗不解悶煩自汗脈象濡數舌絳苔白其邪蘊於少陽陽明正氣欲虛恐其變痢二陳湯加葛根淡芩神麯連翹案積勞陽傷之體痢後元未恢復邪藏隱僻之處寒熱去來靡定深非所宜也三甲飲案伏邪發在初秋夜多煩熱寤言不寐早用清營分之熱焉用達泄豆卷薄荷山梔竹葉青蒿淡芩枳殼連翹案表熱不壯痞脹不食少腹隱隱攻痛舌苔黃濁脈不流暢此必陽邪陷入陰經肺氣不通所致頗為費手仿仲景法兼佐以濁泄濁四逆散加薤白頭案伏邪發於秋杪淹纏半月形凜身熱日晡則甚平旦則減脈弦細數舌黃無苔煩勞素虛之體不但陽傷陰氣亦傷自難送邪外達復脈法如何復脈散去人參麻仁加丹皮案伏邪至兩月胸腹灼熱始終未退而復發寒熱熱後大便瘕泄痰嗽氣逆嘈雜如飢寤言不寐舌絳干苔黃膩脈空數酒客平素濕熱蘊蓄中焦扶外邪必逆滿病久正虛邪痹最恐陰陽風動議用瀉心法川連乾薑黨參茯苓淡芩半夏炙草案胸脹悶熱咳嗽痰塞大便頻泄邪踞中下二焦但脈數空軟舌伸發抖下真自空陡然虛波不敢不慮二陳湯加黃芩黃連洋參竹茹枇杷葉邪匿痰中風陽漸動正氣欲撒若不滌痰邪無出路性天方中加竹瀝薑汁伏邪草四日膚黃不解邪蒙語雜脈空大滑數咳喘痰血舌苔濁干大便仍泄病久五臟之陰皆傷痰熱矇蔽心營肺胃勢必內閉外脫危如朝露不得已勉擬清營滋泄合喻西昌法以冀弋獲枇杷葉麥冬犀角汁藕汁石膏清阿膠鬱金汁川貝生地人參汁竹瀝熱亦短氣亦短正又虛也恐其昏陷急急補之清之竹葉石膏湯熱勢猛烈陰虧風動尚未坦途玉女白虎合劑生地石膏洋參粳米麥冬知母甘草案伏邪晚發濕熱內蒸腹痛脅脹膚黃舌黑右脈如絲恐其邪結正脫至險至險茵陳五苓用白朮川朴川連神麯陳皮去豬苓案伏暑發在秋杪是以辛溫傷陰以致形削色痿今雖漸回尚未恢復診得脈左弦數右軟細是肝升太過肺虛降令不及使之然耳沙參蛤殼杏仁冬瓜子麥冬川貝米仁梨肉案酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也喻云則用涼以撤熱辛苦以泄其滿葛根薑渣橘紅連翹淡芩黃連半夏茯苓二瘧疾門二十四方案瘧用截止乃致壯熱一晝夜弄巧成拙可笑可笑二陳湯去甘草加杏仁川朴柴胡桂枝黃芩案深秋一瘧藥難奏功鱉甲五兩龜甲七錢穿山甲七分案日瘧轉間邪伏愈深何拔松之有二陳湯黃芩柴胡鱉甲薑棗案帶瘧煩勞遂為瘧癆藥餌難治當即歸養歸芍異功散薑棗案不能忘情瘧止又來四獸飲案瘧用截止經至即止舌絳煩渴晝明夜語邪陷血室最恐陡厥大險症也犀角地黃湯加柴胡黃芩豆豉甘草澤蘭楂炭案邪入三陰瘧來無定營衛不和正不勝邪二陳湯首烏歸身鱉甲薑棗案陰瘧淹纏百日近增咳嗆形神色脈空虛項背筋惕病在沖督歷來守不服藥為中醫之戒恐其因循成怯不得不為熟籌之首烏龜甲知母歸身鹿角霜鱉甲麥冬此名鹿首正陽丹案積勞傷陽之體伏邪發在深秋瘧來有寒無熱邪在陰分鱉甲半夏威靈仙鹿角霜生草薑棗案三瘧邪伏在陰也便溏脈遲脾腎之陽已衰當先溫陽截藥真武湯加牛膝案三瘧淹纏正氣日漸消磨脈左弦右滑舌絳膚黃遍身瘙癢濕熱風痰混伏擾亂若不疏風滌痰其正焉能支持威靈仙知母半夏茯苓穿山甲草果仁橘紅薑棗案瘧發三陰纏淹四月脈細數胸悶舌紅神倦形削正氣已虛邪又未達理之不易柴胡炙草歸身薑首烏陳皮茯苓棗案陰瘧久發峻劑傷中上嘔下瀉最防其脫六君子湯薑棗案中陽式微痰濕困中邪匿痰中三瘧不已仿四獸飲意淋濁姑置勿論四獸飲加薑即六君子加烏梅草果生薑大棗案陰瘧久發當搜邪滌痰三甲飲治瘧合二陳湯治痰案瘧疾幾及三月形神色脈皆虛若再淹纏反復驟然脫厥可虞二陳湯加桂枝於朮首烏歸身薑棗案高年三瘧而更浮腫真陽大虧頗非細故擬以補正扶陽兼和營衛人參七分附子一錢肉桂四分生薑一片於術錢半茯苓三錢牛膝一錢大棗二枚案暑濕間瘧臍腹膨滿邪伏膜原恐其發厥柴胡草果川朴半夏茯苓檳榔淡芩甘草案暑風濕熱為瘧體盛脈小陽氣虛也舌如傅粉胸痞脘悶其邪未離膜原惟恐瘧來昏厥達原飲加柴胡半夏茯苓去白芍案暑濕伏於膜原間瘧發於深秋二陳湯去甘草加柴胡黃芩草果知母檳榔案瘧疾變證邪入血室其為至重柴胡淡芩黃連橘紅半夏茯苓竹茹案中秋伏邪瘧後元氣未恢脈細數形神削奪上咳下瀉肺脾同病土不生金恐不成瘧癆沙參山藥米仁炙草於術麥冬茯苓建蓮案瘧發秋杪匝月而止痰邪結痞左脅有塊乃受陰藥之纍也必得再來方有出路二陳湯去甘草加柴胡黃芩青皮薑棗案瘧來深秋三翻四復延至冬半左脅結痞脈弦細數形神削奪面色㿠白伏邪久踞正虛不敵洵可畏也首烏沙參橘白鱉甲麥冬炙草案瘧不了了咳嗆脈數當補肺陰沙參鱉甲苡米川斛麥冬丹皮茯苓麥芽三痢疾門十八方案女伏邪痢疾慮其妨胎白芍黃芩白朮桔梗黃連炙草枳殼荷蒂案伏邪為痢纏綿五旬近因寒熱而痢頓減脈細數唇紅舌白形削色㿠暑去濕存中陽式微矣急急扶正惟恐不及補中益氣湯案脾腎兩虧痢紅不痛黑地黃丸加地榆案久痢腹痛舌白穀食艱運濕熱下著中氣大虧白朮炙草木香白芍炮薑茯苓川連楂炭又方白頭翁湯加木香炮薑茅朮案伏邪身熱自寒露纏自小雪既瘧既痢正氣不勝則恐其脫人參敗毒散案復痢不止者當利其小便五苓散案身熱腹痛塊攻下痢頻頻脈微神倦邪從下陷正氣不守頗為棘手勉擬逆流挽舟法人參敗毒散案脾腎兩虧濕熱下著若不戒酒痢無止期白頭翁湯四神丸案痢久中虛而濕熱尤復下著白頭翁湯加木香炮薑案暑濕食滯釀痢腹痛後重裡急其勢猛烈敗毒散加黃芩案高年休息久痢恐非陰藥所宜連理湯即理中加連加木香秦皮案夏秋病後元未恢復輒而動勞更受秋涼似瘧似痢正氣欲脫全不進谷將何療治清暑益氣意分兩須輕葛根陳皮白芍川黃柏蒼朮神麯甘草黨參升麻補骨脂案伏邪瘧後自不慎守里陷為痢形脈皆虛飲食減少將何恃而不恐黨參理中湯加熟地歸身煨木香菟絲子茯苓案素居陰虧營熱肝氣抑鬱秋初半産之時以後寒熱如瘧邪傳太陰則腹脹消而變痢痢無休息復又寒熱互作骨瘦如豺脈微如絲舌光如鏡皺紋如紗此屬陰液乾涸陽氣外脫營衛分爭之勢正秋冬之交歷歷危懼竭蹶擬方人參炙草生薑白朮歸身大棗阿膠橘白稻葉案由瘧變痢起自半秋纏綿休息近冬不瘳腹中微痛面黃不澤舌苔白膩脈左關弦右濡下痢紅白相兼大便不實此因濕暑傷中氣分有濕血分有熱脾虛肝盛所致治以扶中養肝清熱利濕四君子湯加白芍陳皮楂炭藕節炭荷蒂焦鍋巴代水案古方痢疾名曰滯下滯者言其濕熱之邪蒸釀為痢也若不清理濕熱則漫無止期陽藥既多自當以丸劑圖之炒焦茅朮一兩煨木香五錢炒地榆八錢大白芍一兩土炒於術兩半六神麯一兩川黃連五錢北秦皮一兩福建澤瀉一兩南楂炭兩半烏梅肉三錢炙甘草三錢白雲茯苓兩半炮薑炭三錢川黃柏七錢炒黃米湯泛丸每日服五錢參湯送下午後服東引臭椿根皮去木洗潔曬乾切片磨粉炒糯米粉黑糖拌服案女久痢命門酸墜脈細數舌紅腹痛後重恐陰虧氣陷暑濕黏著最恐妨胎之險焦白朮白芍黃芩穀芽雲茯苓炙草川連荷蒂案酒醴濕熱蒸傷臟腑夕陽在山之象葛花川連茯苓雞距秦皮神麯四肝火肝風門三十四方案心腎陰虧肝陽上旋制洋參元武板酸棗仁淮山藥淡天冬鹿角霜雲茯苓大熟地左牡蠣女貞子案腎肝陰虧水不涵木風動挾痰混擾氣根不固則喘治宜滋腎養肝熄風化痰燥熱剛劑與病相左熟地橘紅牡蠣竹瀝天冬阿膠白芍淮麥川貝茯苓案濕熱蘊蒸肌表遍體發瘰瘙癢高年腎真下虧風陽上旋眩暈細生地桑皮米仁石決明白芍藥丹皮茯苓川石斛案肝膽氣火升逆陽明頭額掣痛莫作風醫黃連溫膽湯案素體陰虧肝風挾痰擾亂黃連溫膽湯加石決明案此肝急病也得之思慮驚恐若躁擾不已則防變端當甘以緩之酸以收之甘麥大棗湯加白芍藥案氣血並弱脾虛肝熱於術炙草歸身川連茯苓陳皮白芍丹皮案少陰咽哽遍體浮腫膚黃舌濁脈細弦數陰虧肝鬱之體濕熱內蒸也當以養陰泄熱疥瘡存而不論黃連阿膠湯案陰虧痰盛之體煩勞過度心陰耗散肝家風陽內煽肢麻心恍溫膽湯去枳加石決明棗仁案九竅不和即屬胃病平肝即以和胃石決明淮小麥半夏曲秫米鉤藤鉤白茯苓廣陳皮金斛案恍惚驚悸眩暈怔忡脈芤澀形疲色不華皆由心陰過虧暗吸腎真水不涵木則無風而自動矣熟地白芍淮麥茯神山藥甘草南棗牡蠣案心神不寧痰火風陽煽動忽惡寒忽惡熱恐懼疑惑而動其中當此陰陽交接之節宜與養補元神洋參棗仁淮麥牡蠣生地茯神橘紅案酒醴濕熱傷中為之頭重足輕桑葉黑梔半夏石決明甘菊橘紅竹茹案手不定心亦不定當細思之麥冬大棗湯加生地白芍燈心案心營內耗暗吸腎陰少寐氣短似喘孤陽上冒面赤足冷肝逆犯胃吞酸妒谷表陽外薄汗出津津色脈皆虛非補不可更須息心靜養庶幾藥力奏功兩儀茯神橘白棗仁豬膽汁拌炙草竹茹龜板淮麥煎湯代水案精氣神皆脫真陰下竭孤陽上越危形已迫矣奈何勉與鹹苦滋泄載神返宅人參方諸水胡黃連生牡蠣再以鹹苦直入至陰佐以扶正前方加天冬二錢生地五錢龍齒一兩案邪説暴行又作陰陽不相維繫而徒然昏脫合鹹苦直入至陰之外無他道也人參牡蠣天冬生地胡黃連方諸水龍齒龜板白童便案肝陽化風內有伏痰治當熄風緩肝不可香開不可克削甘麥大棗湯加白芍鉤鉤案脈細左弦右澀營虛水虧肝木失涵虛風內動所以見症若此當養肝腎之陰佐以滋鎮熄風歸身阿膠麥冬紫石英白芍熟地石決明沉香汁案久病隱曲旁雜不離肝臟姑以甘緩酸泄鹹寒內沁以消息之甘麥大棗湯加白芍雪羹湯代水案肝腎陰虧風痰濕熱上蒙清竅耳為苦鳴臍為之漏六味丸加山梔甘菊石決明案真陰下虧虛陽上冒舍鹹苦滋納之外別無他路洋參天冬女貞淡貢菜熟地知母牡蠣十大功勞葉案頭痛滿蒙右半尤甚鼻塞涕濁脈數弦滑肝陽挾痰火上升無制治當清降化痰用風藥升散無怪其難忍矣二陳湯加生石膏天冬石決竹茹案肝胃風火挾痰痹絡頸項牽痛核起當清肝疏風化痰羚羊角甘菊花山梔甘草鉤藤鉤橘紅連翹夏枯草案脈澀右空左細四肢麻木形容不澤心腎陰虧肝木失涵風陽竊動當乙癸同源熟地白芍阿膠歸身天冬炙草甘菊南棗淮麥杞子案血虛營熱木火煽爍酸甘以化之淮麥白蜜風雨梅甘草白芍案營血久虧肝陽化風挾痰擾亂神明陡然痙厥去來靡定羚羊角石決明白芍茯神鉤藤鉤中生地麥冬白薇薑汁竹瀝案脈象病情並無進退而終歲嘵嘵心陰暗耗陽豈能潛今當秋冬自宜養陰不必煉真説假熟地黃精鮑魚麥冬山藥牡蠣復診洋參白芍土貝母阿膠石決明三診今日胸腹不飢貝母解鬱嫌其苦寒照昨方加金柑皮四診勞傷心脾不能生血灌溉以致舌乾腹鳴神煩少寐治當補養心脾潤肺滋肝黨參白芍麥冬棗仁首烏丹皮阿膠茯神五診且和肝脾白芍炙草炒黃米灶心土六診邇日脈形細軟兩尺微數面黃肌瘦舌起刺心腎之火不靖脾陽不運肝氣升逆肺失肅降治宜運中固下勿拘拘於養陰若雜亂無章焉能向愈系痛癢相關敢不瀝忱苦告候諸同學印可豬肚丸晨昏各服一錢五分炒黃米湯送下過冬至再議七診養陰清肝毛青布決明子阿膠夏枯草生白芍鮑魚五痰門二十一方案肝風痰火擾亂神明羚羊角石決明橘紅薑汁鉤藤鉤川貝母竹瀝案脾虛生痰木火擾胃丸方於術半夏川朴茯苓陳皮川連竹瀝為丸案內風痰中衝擾羚羊角石決明膽星薑汁鉤藤鉤天麻竹瀝前診付藥十劑才越三日又來問治如此性急因何病纏半載今且服完前藥四劑接近指迷茯苓丸一月再診痰之為病莫作怪治三子養親湯合二陳湯去甘草加天竺黃杏仁案痰之為病變怪不測心緒不寧痰熱擾亂指迷茯苓丸案中虛積飲六君子湯加乾薑附子諸氣膹郁皆屬於肺濁氣在上則生䐜脹必有痰氣阻痹上焦不得宣化前所服藥姑緩枇杷葉橘紅米仁川貝母杏仁蘇子通草案中下陽微痰氣上泛神憊脈緩六君子湯加乾薑附子案脾為生痰之源肺為置痰之器脾肺同病治當兼顧二陳湯去甘草加於朮沙參藿斛枇杷葉海石案午後嗆甚痰稠脈弦滑數是肺火上浮以輕劑清苦降之川貝知母申刻復診咽癢則嗆甚覺有冷氣上衝肺雖有火痰性本寒也前方加蘇子使其降氣滌痰夜來痰咳小緩寐亦少安仍從昨法稍為損益桑葉甜杏仁元參茯苓枇杷葉阿膠瓜蔞霜米仁沙參川貝母蘇子案飲食之後舌蹇言語不清脈弦數是水穀之氣挾痰火上升法宜養胃並治再仿溫膽之意竹瀝霞天曲茯苓瓜蔞仁枳殼陳皮蘇子枇杷葉案肝家風火挾痰擾亂若心神不定恐成癲癇黃連溫膽湯案肝升肺不降脾胃痰上泛化肝煎加蘇子旋覆花案中下陽微陰濁寒痰上升嘔吐涎沫心中嘈雜脈濡細舌白序屆冬至陰陽交潛之時恐其不相維繫世兄方甚合僭加附子一錢人參茯苓橘紅紫石英熟地白芍牡蠣沉香汁脈如蛇行遍體漉漉有聲胸膺瞀悶咳嗆不爽此必痰飲水濕凝結經絡補之固屬無益而峻攻又恐伐元極難取效者六君子湯去人參加鉤鉤米仁用薑汁竹瀝泛丸先服控涎丹一錢五分勻三日薑湯下案高年不憚勤動從高墜下趺痛左肋艱於轉側脈有歇止氣喘咳嗽厄忒頻頻寢食皆少是陰虧內熱肝升肺不降也最恐厄而致痰塞氣厥陳皮白芍石決明薑汁半夏白薇旋覆花竹瀝案病後神魂失藏心中有瘀血惡痰白金丸錢半案中氣虛寒痰凝阻肝氣升逆旋覆代赭石湯六肝氣門三十三方案肝邪犯胃寒濕困中吳茱萸湯加白芍茯苓甘草案心緒不寧氣火流入小腸不通則痛宜宣通腑陽之郁不可溫不可攻烏藥山梔木香木通赤芍赤苓案病後邪伏不清元不復反煩勞以致肝氣逆胃不飢不便色脈皆虛若不進谷何恃而不恐左金丸青果二枚泡湯送下案陽虛陰痹氣阻痰凝桂枝湯合二陳加瓜蔞薤白案胸膺掣痛經久不愈必有痰濁凝阻三味旋覆花湯加桃仁湖藕枇杷葉又診文蛤散案胃氣受寒脘痛嘔吐脈遲而滑老年陽衰所致吳萸蘇梗陳皮乾薑茅朮甘草案沖氣陰虧肝氣悒鬱左脅痞結絞痛法當和養肝陰辛燥剛熱破氣破血必然弄成臌脹化肝煎加阿膠生地案右腹有形攻痛此肝氣也烏梅赤苓山梔歸鬚木香木通茴香案血虛氣滯肝鬱作脹消補皆礙古人治肝之病諸藥不效者則有雪羹湯咸涼內沁之法雪羹湯案積勞陽傷氣血並弱肝邪攻逆犯胃痰飲不降難進疏達必兼扶正吳萸人參炙草半夏川楝白芍橘紅茯苓案養陰通絡脅痛不減當開肺氣枇杷葉新絳緯杏仁湖藕旋覆花青蔥桔梗案營絡既阻氣絡亦痹三味旋覆花湯加紫菀桔梗歸鬚柏仁藕汁案無法了障肚腸痛也烏梅青皮赤芍木通檳榔木香丹皮山梔案腰痛腹脹嘔吐酸水脈弦左小舌絳苔白面赤足冷肝氣貫膈入胃腎病善脹使然當與苦辛泄降咸涼內沁分頭而治左金丸出境雪羹湯案心痛徹背背痛徹心煩勞多飲陽虛胸痹瓜蔞薤白桂枝案陽虛胸痹背膊作痛便閉理之非易瓜蔞桂枝半夏檳榔薤白川連枳實案邪入厥陰風木擾亂胃腹中絞痛陳作蛔上攻也恐其閉脫安蛔丸案少腹之痛偏左上逆欲嘔中氣大虧肝鬱不舒補之恐脹瀉之轉虛姑與化之化肝煎案肝鬱不疏泄氣從上逆則胸膈痞塞當與化之化肝煎加旋覆花案厥陰之氣衝斥陽明升逆則病降則平復吳萸白芍赤苓川楝川牛膝甘草案攻藥傷中肝木乘脾元氣受戕以致形神削奪脈空數左脅痛引及背纏綿日久氣營並虧又自不能節勞極難恢復當和脾養肝於術沙參白芍鉤鉤炙草茯苓阿膠橘紅案營虛絡痹不特肝氣三味旋覆花湯加歸鬚柏仁藕肉案酒醴濕熱久阻中焦肝氣逆胃脘痛嘔吐食鴉片者病進藥每不靈驗擬丸方吳茱萸三錢炙草四錢烏梅五錢延胡索一兩小川連一兩青皮一兩茯苓三兩半夏一兩五錢白芍三兩當歸二兩川楝一兩生術二兩案氣鬱血瘀思慮傷脾惱怒傷肝木乘中土上衝則嘔下奪則瀉法當苦辛泄木酸甘和陰病久正虛必須兼益氣之品人參生白芍炙草金鈴子延胡索案腹痛欲死此中虛受寒也當歸建中湯案虛里穴痛引及胸脅飲食阻咽脈芤澀肝氣抑鬱營絡空虛未老先衰恐成膈症辛燥開氣清涼凝滯皆與病左旋覆花瓦楞子須歸湖藕柏子仁首烏阿膠案心痛徹背時發時止脈細澀中焦營虛肝氣貫膈入衛當和營養血柔肝利絡不可香燥克氣擬膏方旋覆花二兩柏仁四兩白芍二兩川楝子二兩甘草五錢新絳緯二兩延胡索二兩文蛤殼八兩青蔥二兩阿膠二兩歸身二兩湖藕八兩案脈細數弦滑肝氣素盛酒醴濕熱化火化痰木火橫逆則脅脹背痠肺金不肅則痰塞咳嗆治當化肝降肺化肝煎加蛤殼麥冬案怒則氣上思則氣結旋覆花蘇子石決明丹皮枇杷葉杏仁山梔麥芽案陰虛肝旺血少氣多恣意香燥必然乾癟癟化肝煎加阿膠橘葉案肝鬱氣脹左升太過右降不及枇杷葉桔梗白芍杏仁青皮丹皮枳殼山梔麥芽案心焦營傷心脘絞痛當歸建中湯案營瘀痹阻胸脅隱痛三味旋覆花湯加歸鬚桑白皮丹皮湖藕案中虛肝乘腹膨痹痛桂七味丸七疝氣門三方案肝疝痛脹溫氣苦泄不效勢屬難治天真丸錢半開水下案陰絡受寒氣與濕痹當歸四逆散加川斷肉杜仲金毛狗脊去棗案痛在臍下形寒怯冷脈數舌乾白春寒襲入厥陰深慮發厥與仲聖方當歸四逆散桂枝白芍細辛甘草木通大棗八喘門五方案氣不歸根喘塞不得臥最有虛脫之慮病人前不便直言都氣丸兩紫石英兩絹包同煎衝入沉香末五分案肺有風寒兼受秋風喘急不已慮其驟脫桂枝湯合麻杏石甘湯越婢意案怒則氣喘驚則氣亂若不歸根則神明散失都氣丸龍骨牡蠣絹包同煎入沉香末小匙案三陰並虛氣不歸根食少事繁孔明年紀金水六君煎加紫沉香案本有喘哮更受嚴寒痰如鋸聲其勢危急小青龍湯九中風門九方案偏中在左最怕悠悠忽忽而脫六君子加天麻殭蠶竹瀝薑汁案痰濁困中真陽欲脫理之棘手白通湯加竹瀝薑汁案已成癱瘓藥難奏功勉給一方不必再來生地鉤鉤橘紅當歸石決明竹瀝白芍天麻薑汁案陰虧風襲陽明經絡內風竊動而為類中之象不是小病治風必兼養陰化痰前恙姑置勿論生地鉤鉤橘紅薑汁羚羊角天麻石決明案廉泉穴開寐中流液於術橘紅石決明丹皮半夏茯苓黑山梔案痰濕本盛猝然舌澀語澀瘖始基當戒意之六君子去人參加天麻竹瀝薑汁案心腎陰虧廉泉穴開熟地萸肉棗仁五味山藥牡蠣雲苓南棗案下焦空虛廉泉穴開口吐涎沫宜都其氣都氣丸案三陰並虧內風挾痰旋繞不息廉泉穴開河間地黃丸四兩薑汁三匙開水和勻送下十痹痿門二十四方案脾腎兩虧筋骨痿弱健步虎潛丸鹽湯送下案幼年陰虧腎熱家富過分溫飽醫藥雜投熱補弄成骨痿可發一笑大補陰丸案氣血皆虛肝陽化風內煽恰至冬至大節陡然昏暈神迷右肢不用脈細滑數此偏中也七日以內謹防昏厥汗越非指日可愈者不敢泛視陳皮石決明竹瀝於術半夏遠志肉薑汁案類中口眼歪斜陳皮天麻半夏於術菊花鉤鉤殭蠶薑汁案濕熱痹絡筋骨不束機關不利治在足太陰陽明生於術米仁石膏嫩桑枝赤苓萆薢山楂案病入經絡藥難奏效若性急則更醫調治生地鱉甲桂枝晚蠶沙黃耆桑枝秦艽歸身牛膝杜仲案牙齦不腫而痛脈數左細右大陽明有餘少陰不足右股痹痛亦屬陽明絡熱非寒也玉女煎案陰虧腎熱漸成骨痿而又中焦虛寒病殊兩歧當分頭而治之陳皮生薑米仁半夏於術大補陰丸衝入案脈細數此陰虧腎熱症也又誤投剛劑燥形疲肉消古人云人火無物不消漸漸骨痿不起於床矣奈何奈何急進鹹苦滋泄猶恐鞭長莫及大補陰丸案病在左臂晝輕夜重脈滑疾自必氣血兩虛風痰襲絡法宜補氣養血熄風化痰兼通營絡擬膏方桂枝清阿膠防風旋覆花羚羊角川貝母黃耆新絳緯桑枝鉤鉤虎脛骨橘紅大生地茯苓於術歸身薑汁竹瀝案肝主筋腎主骨肝腎虧則筋骨痿弱熟地黃耆蒺藜萸肉歸身杜仲山藥杞子牛膝案陰虧腎熱左膝腫痛經年恐成骨痿大補陰丸外用活絡丹酒磨搽患處案漏肩風乃積勞陽傷氣血交衰所致桂枝威靈仙五加皮嫩桑枝鴨血拌炒黃耆歸身左秦艽鱉甲枸杞子茅柴根案陰虧胃熱肌肉作痛清之補之人參麥冬花粉茯苓生地川斛橘白甘草案陽明絡熱有風有痰筋骨不束機關不利也酒炒桑枝鹽水炒牛膝熟石膏案痛無定處氣絡先痹營絡亦痹三載之病急切難治白麻骨茜根炭瓦楞子紫菀頭大豆卷生菟絲白蒺藜湖藕肉案風濕與熱搏激陽明經絡白虎歷節風是也白虎湯加牛膝桑枝案陽微之體痰飲濕熱痹著經絡於術米仁防己川柏陳皮半夏萆薢案風濕與熱相搏陽明絡中為之行痹認真服藥避風忌口匝月方愈桂枝白虎湯加牛膝桑枝案右肱麻木痛楚脈空右大營氣交虛風濕痹絡羚羊角虎脛骨金斛萆薢桂枝天花粉茯苓桑枝案濕熱與風相搏筋骨折痛腿足漫腫羚羊角花粉豆卷牛膝桂枝防己車前鉤鉤萆薢桑枝案寒濕痹絡筋骨掣痛桂枝金毛脊歸身杜仲獨活萆薢牛膝陳皮案沖年陽常有餘陰常不足濕熱痹絡流入骨髓漸成痿弱當養陰清熱不可表散溫經擬丹溪法大補陰丸淡鹽湯下案營絡空虛痰飲流著麻木掣痛屈伸不利桂枝桑枝首烏米仁羚羊角鉤鉤歸身橘紅竹瀝薑汁十一黃疸門二方案積勞陽傷濕鬱不化脘脹膚黃治之非易茵陳五苓散加附子案陽微之體濕熱困中發黃晦暗恐變黑疸茵陳五苓散加附子十二郁門二方案氣鬱血熱肝藏偏勝與之和養使各得其平生地山梔白芍香附丹皮柴胡川芎逍遙合越鞠意案憂鬱傷肺從革作辛也白芍天冬牡蠣茯苓甘草生地十三勞怯門二十二方案十九年矣猶有童疾天癸不至痧癆成矣藥所難治且以飲食消息之三仙粥案當知夕陽在山何必再來問治八仙長壽丸案五勞七傷草木難治河東大造丸案陰虧腎熱筋骨凸起損證之見端也急急保真庶或可救大補陰丸案童勞已成云何無事秦艽前胡紫菀甘草鱉甲川貝桑葉銀柴胡茯苓歸身案努力太過陰絡受傷此人自為之非天生之病大補陰丸案陰虧勞熱秦艽丹皮生地甘草鱉甲麥冬銀柴胡骨皮當歸茯苓案陰陽氣血皆虛如之何其撑持大補十全丸每服四錢棗五枚龍眼肉九枚煎湯下案氣血並弱四歲之下尚乳必然陰乾陽盡成其怯症矣何為用雜藥石女科八珍丸米湯送下案陰乾陽盡中氣告竭藥餌難治矣百里而來勉給一方如不見效切勿往返補中益氣湯案秋初失血吐之甚狂癸水自此不至逢節必發脈細數咳嗆形凜骨蒸已成勞損矣憂自乳子何不惜身命若此沙參芍藥蛤殼百合生地阿膠川貝歸身麥冬地骨皮案久病纏綿反復形神色脈皆虛當此一陽將萌更何恃而不恐不敢用藥勉擬飲食調養以冀扶延建蓮山藥茯苓米仁倉米砂仁各味磨粉黑糖拌不拘時取服案上吐下瀉脈軟音瘖法扶土生金山藥白朮麥冬冬瓜子扁豆茯苓米仁炙甘草案耽酒惡酒其病已成葛花淡芩半夏神麯雞距石斛赤苓澤瀉案損怯而至音啞喉痹骨瘦如柴色脈皆脫已是末傳非草木能療者豬膚湯案沖年失血虛損更兼痰核焮腫癧癆之漸可不懼乎六味湯加海帶菜夏枯草牡蠣案鼻塞薰蕕不聞是沖年自不保真上實下虛當與補之不可傷肺者六味丸加百合案脈象左弦微細右空若谷何虛之如是洋參天冬茯苓龜板熟地山藥牡蠣百合案憂思傷肺惱怒傷肝陰竭陽亢以致損怯擬錢仲陽法補肺阿膠湯加敗叫子蛤殼百合案損及中焦藥餌難行勉擬慰遠大熟地炙草山藥制於術當歸阿膠炒白芍茯苓麥冬案積勞陽傷之體深秋痰嗽失血纏淹百日形脈皆衰理之非易人參當歸麥冬生薑黃耆炙草阿膠大棗案沖年陰虛瘧後不復咳嗆痰稠脈細空數形神皆奪是近怯之機可不懼乎沙參麥冬當歸橘紅首烏茯苓米仁川貝十四咳嗽門附肺癰十一方案咳而欲嘔其病在胃竹茹杏仁川貝茯苓金斛米仁麥冬案酒濕秋燥爍金痰咳經久不愈葦莖湯加枇杷葉川貝麥冬案久嗽痰腥肺癰之象清燥救肺湯去人參阿膠甘草案深秋風燥傷肺咳嗆痰血誤食豬肺斂邪牢固弄巧成怯症好事者為之也葦莖湯加川貝湖藕案風傷皮毛熱傷血脈咳吐痰血氣腥恐成肺癰葦莖湯加地骨皮川貝母知母藕汁案脈滑舌白因痰而咳二陳湯加白朮乾薑藕汁案咳嗆夜甚嗽而欲嘔動則氣喘脈細數腎陰下虧肝火上逆肺不肅降必須養肝攝腎和胃化痰斷不可開泄上焦矣黨參熟地阿膠竹茹蛤殼麥冬川貝茯苓案金實則啞金破亦啞肺病難治白麻骨通草冬瓜子杏仁嫩竹衣蛤殼金銀花米仁案嗽而欲嘔其病在胃杳不進谷洵可畏也方俟續案咳嗆匝月誤服酸梅以致咳吐濁痰上泛如飲背凜冽嗆甚灼熱不休肌瘦脈數舌白勢將成癆矣案云溫邪內郁挾痰飲蓄結於肺俞所以背寒則咳嗆邪為酸斂固結不解熱戀傷陰肌膚焦灼飲蓄於中舌白不濁矣此症近似勞怯而非怯也斷乎不可以補若補邪愈無出路而成怯症矣肺俞二字是看病眼目葶藶大棗湯合葦莖湯瀉白散主之復診背寒灼熱已解而咳逆得松照方加紫菀此等症最易差誤故治病必求其本泛泛用藥斷難取效又最易以此為勞症也十五吐血門二十方案勞役奔走震動陽絡咯血匝月近因秋燥上干咳嗆咯痰仿喻西昌法清燥救肺湯案陰虧秋燥失血清燥救肺湯去石膏加湖藕梨肉案咳嗽傷肺絡屢屢失血山藥麥冬紫菀川貝生地鮮生地款冬花杏仁沙參地骨皮案陽絡傷血從上溢陰絡傷血從下滲上下失血陰分大虧大補陰丸加洋參阿膠血餘藕節案衄血屢發天癸不至玉女煎加梔子丹皮案腹痛痢下重於隆冬溫邪入絡咯吐痰血黃芩橘紅米仁瓜子殼桔梗川貝茯苓案陰虧火炎春咳徂臘失血盈盞症成怯矣生地藕汁沙參童便麥冬墨汁出境茜草案咳傷肺絡失血不難成怯矣葦莖湯加地骨皮湖藕肉案冬溫蘊肺咳傷肺絡失血其勢不輕葦莖湯加茜草墨汁藕汁童便案失血咳嗆屢發不已脈細澀心腎之陰已竭急宜平補偏寒偏熱均未得其病之旨黃耆熟地麥冬茯苓黨參百合歸身甘草案春初咯血較之冬半倍多脈數左空弦舌顴赤肝腎陰虧孤陽上冒最恐暴脫擬乙癸同源熟地知母白芍豬脊髓龜板阿膠童便復診照前方加牡蠣案肝陽失血山梔生地茜草藕汁丹皮阿膠墨汁童便案病後失調咳嗆痰血脈數右空肺已損傷勢難治也補肺阿膠湯案秋燥傷肺木反侮金咳嗆失血氣逆不得臥自宜清降且勿滋補葦莖湯加桑皮地骨皮枇杷葉通草案絡傷失血不可亂藥炙黑甘草三錢井河水各一碗煎案負重遠行震動絡血生地桑葉桃仁藕汁丹皮茜草米仁案肺胃絡傷咯血經載漸入虛門矣茜草根蒲黃炭生地黃白扁豆牡丹皮藕節炭側柏炭小青皮案痰血下午偏多氣分熱熾大沙參金石斛貝母冬桑葉天花粉知母案馳騎習武百脈震動動則絡逆為痛血沸出口納食起居無異平日非虛損也凡氣為血帥氣順血自循經不必用沉降重藥枇杷葉蘇子苡仁金石斛桃仁降香末十六腫脹門十七方案足腫腹脹筋見臍凸舌白脈沉細此虛臌也急切難治附子理中湯案慳長本是癆名今足腫腹脹大筋見臍突且兼膨脹將何療治五苓散加薑皮大腹皮桑皮案內傷飲食外感風寒單腹脹最恐驟變柴胡葛根莪朮黃連麻黃山稜半夏神麯案脾腎陽虛水濕浸漬浮腫下甚神倦脈微最易虛脫真武丸案風水皮水音啞短氣治在上焦桑皮連皮杏仁蟬衣牛蒡子米仁帶皮茯苓通草稻根鬚案一身悉腫下焦尤甚咳嗆喘急便溏不爽肺風皮濕症屬棘手勉擬兩開太陰太陽五苓散合五皮飲案泄瀉便溏腹大筋見臍突咳嗆脈數膨脹癆損已成甚為棘手桑皮大腹皮桔梗砂仁殼杏仁茯苓皮川連炒麥芽案臍凸腹脹偏左脈細數肝氣抑鬱所致不易速效者化肝煎加柴胡香附案濕濁困中肝氣作脹茅朮青皮栝樓枳殼川朴檳榔薤白麥芽案中下陽微囊腫腹脹數進通陽理中罔應豈不棘手天真丹案莖衄甫止遍體浮腫脈細數澀血化為水邪熱走入空竅也茯苓米仁稻須紅棗黑豆桑皮通草案瘧後變臌勢屬難治柴胡川連杏仁黃芩瓜皮薤白半夏枳殼桔梗案瘧用截止邪陷中焦更以蕩滌中傷變臌邪無出路正立消亡理之極難勉與四逆散仿陽邪陷入陰經之例解柴胡白芍枳殼炙甘草案瘧截變臌必得復來方有出路柴胡青皮神麯茯苓黃芩草果川朴大腹皮案老年中下陽微漸成水腫水泛濟生腎氣丸三錢案瀉後腫脹從下起脈遲細舌白中下陽微恐其悠悠忽忽而脫白朮桂枝炮薑椒目附子川朴茯苓牛膝案脈細左弦右澀腹大囊腫筋青臍凸此因鬱怒傷肝思慮傷脾所致木來剋土血不歸經致成臌脹苦寒溫熱皆與病左且擬薛立齋法以消息之加味歸味湯十七噎膈門十一方案痰氣噎膈薤白汁竹瀝藕汁黃牛乳薑汁枇杷汁案酒濕薰蒸肺胃久久漸成膈症旋覆花陳皮枇杷葉竹瀝雞距半夏杏仁薑汁案陽虛氣痹防其噎膈旋覆代赭湯加枇杷葉蓽澄茄案氣血痰火阻結上關下格理之棘手旋覆花橘紅乾薑紫菀制軍單桃仁半夏降香柏子仁案嗜酒中氣自虛痰濕痹阻賁門而成膈症理之非易旋覆花桃仁陳皮藕汁枇杷葉半夏竹瀝薑汁案高年酒醴濕熱與痰氣阻膈得進稀粥方可苟延黃牛乳枇杷露竹瀝地栗汁即荸薺薤白汁藕汁薑汁隔湯煎滾服案血膈已成藥難奏效胡不歸勉擬慰望枇杷葉川楝紅藍花湖藕肉桃仁延胡索降香汁案積勞陽虛寒痰凝阻恐其噎膈反胃蓽澄茄半夏茯苓枇杷葉生薑橘皮桃仁案上關下格胃中泛逆急切難治蓽茇三個半夏黃牛乳案氣鬱血熱肝膽之氣充斥陽明噎者膈之始基也溫膽湯去枳殼半夏加黃連白芍案痰火氣血阻結賁厭而為噎膈證屬難治旋覆花竹瀝枇杷葉藕汁單桃仁薑汁降香汁菜汁十八噯噫痞塊門四方案怒則氣上驚則氣亂旋覆代赭湯案臍腹起痞有形略偏於左脈細數左弦右軟舌苔干質高年氣血兩衰思慮傷脾鬱怒傷肝乃為中虛氣痞之症理之諒非易也於術黃連白芍沉香炙草肉桂牡蠣茯苓案飢飽失時中虛氣痞旋覆代赭湯案過分香燥克消因致中虛氣痞旋覆代赭湯十九不食不寐門五方案此腎開胃閉若培中則胃愈窒當從下補熟地菟絲子陳皮沉香汁萸肉茯苓石英案寤言不寐膽胃不和溫膽湯加石英案陽蹻脈滿令人不寐黃連溫膽湯案膽熱不寐虛煩自汗溫膽湯加棗仁案心脾陰虧徹夜無寐便溏食少肝火閃爍嘈雜噁心自汗黑歸脾湯加黨參川連二十癃閉腸痹門四方案氣陷小便不通補中益氣湯外用大蒜梗煎洗復診六味湯加益智黃柏案心主無為而治小腸代心行事有所鬱而氣痹治當宣通腑陽烏藥赤芍赤苓木香木通赤小豆案病逾百日身熱來去靡定脈數舌絳小便數欠此屬童年陰虧濕熱癃閉州都所致氣化失司法當養陰利濕使其熱從小便而出豬苓湯二十一遺泄門二方案二氣交虛精神失守黨參天冬牡蠣熟地白芍川柏茯神龍骨山藥案恐則精卻神志失守熟地丹皮茯神棗仁山萸山藥龍骨遠志二十二泄瀉門五方案脾腎兩虛濕困中焦於術茯苓木香山藥炙草乾薑陳皮菟絲案形寒身熱一載有餘便溏脈細澀表裡皆虧氣虛下陷擬東垣法補中益氣湯案脾虛肝盛腹痛泄瀉遍身作脹逍遙散加鉤鉤香附案寒濕困中脾傷不磨蘇梗神麯枳殼川朴白芍茯苓木香麥芽炙草案上咳下瀉形神削奪脈細舌白肺脾虛寒治在中焦於術白芍煨薑茯苓陳皮黑棗二十三便血門五方案形偉脈小細而且澀心脾陰虧血從下溢歸脾湯去遠志桂圓加白芍阿膠焦鍋巴案肝脾受傷腹痛便血塊攻有形理之不易人參炙草炮薑藕節黃耆歸身川柏於術木香升麻案脾虛氣陷濕熱下注洋參歸身陳皮於術白芍槐米炭炙草醋炒升麻炒木耳案嗜酒中氣自虛操勞過度心脾陰傷忿怒抑鬱肝陰亦傷肝不藏血脾不統血血不歸經滲而為瘀今留血上下皆溢而絡空氣痹脘背兩脅少腹連及腰走注疼痛右脈芤澀左寸空谷面部浮黃肌膚失澤氣營並病有虛有實理之非易必須靜養怡悅多方調治若躁急心熱藥難奏效公議益氣養血和營通絡法人參柏仁旋覆花白芍歸鬚新絳緯阿膠橘紅湖藕案大便連行糞黑居多仍是瘀也滿腸皆痛遍體浮黃少食無寐六脈空谷二氣交虛精神失守怕其悠悠忽忽而脫急急補養平調猶恐鞭長莫及人參炙草熟地醋炒升麻白朮茯神阿膠廣木香於術棗仁二十四淋症門十四方案濁病皆由心氣虛不宜只作肝腎醫四君子湯加遠志案尿血三載陰絡大傷理之極難洋參甘草梢白絲綿灰生地血餘炭醋炒升麻阿膠藕節炭白綿紙灰案濕火未清且勿止澀赤苓丹皮生地草梢澤瀉山梔川柏案酒色過度陰絡大傷瘀濁凝阻愈藥愈亂無從下手姑與扁鵲方先解藥毒三豆湯甘草節案心腎兩虧陽明濕熱豬肚丸案血淋半載陰絡大傷若再通利弄成損症生地麥冬血餘炭元武板洋參白綿紙炭阿膠草梢藕節炭案濕熱敗精阻竅小水不通威喜丸一兩勻三日嚼碎牛膝錢半煎湯下案心陰受傷熱移小腸莖痛溺血不是小病洋參阿膠草梢藕節生地川柏血餘案白濁患於文墨之人是必心虛所致景嶽歌云濁病皆由心氣虛不宜只作腎肝醫四君子湯加遠志兩服之間效更奇古人豈欺我哉世俗養陰通瘀利濕皆通套治法與病無益四君子湯加遠志案跌傷陰絡溲難尿血理之極難生地牛膝草梢歸尾阿膠琥珀血餘川柏案陰絡受濕熱所傷淋濁莖痛二字全戒為要川柏一錢萆薢一錢赤苓三錢血餘錢半澤瀉錢半阿膠錢半血珀研沖七分生地一錢草梢錢半案肝腎陰虧濕熱下注萆薢黃耆茯苓女貞子川柏蓮鬚澤瀉甘草梢案夏暑秋風傷肺移熱大腸溏泄便血濕阻州都則為莖痛治宜清熱導濕舌光脈數陰液大虧當兼顧之豬苓湯案陰絡受傷血出溺道已棘手矣云何勿礙生地五兩血餘一錢升麻炭三分琥珀五分阿膠錢半川柏一錢舊筆頭三個燈心一分藕節一兩草梢五分合研二十五蟲門二方案陰虛之體濕熱蒸於腸胃則寸白蟲生不易速愈黃連枳實川楝茯苓乾薑檳榔神麯澤瀉案鬲腸不便上為口糜下為滯下內生蟯蟲勞心抑鬱所致胡黃連赤芍小木通鶴蝨草苦楝根皮檳榔雌雞淡清湯先飲少頃然後服藥二十六産後調經胎前崩漏門十四方案産後營虛氣不歸根熟地麥冬石英歸身五味沉香炙草山藥茯苓案心脾陰虧氣滯血熱歸脾湯加山梔丹皮生地案氣瘕乾血四物湯加香附丹參山楂麥芽案心脾極虛八脈損傷崩漏不已最恐虛波黑歸脾湯加元武板紫石英案陰虛肝熱經至不止生地龜板丹皮歸身女貞陳皮白芍山梔茯苓案病在八脈急切難治砂仁炒熟地紫石英沉香汁茴香炒歸身桂酒炒白芍元武板枸杞子鹿角霜案年屆七七癸水應絶而反來日苦多去日苦少脈細數語言窒塞肝腎本虧心脾復傷氣不攝血擬黑歸脾法然非旦夕可愈黑歸脾湯案産後腹痛癸水衍期形神削奪脈微細軟氣營大虧非補不可從未服參反為不對是何言歟黑歸脾湯案春産徂臘月事不來臍下癥瘕隱隱作痛吞酸谷少脈數而虛此屬肝氣抑鬱血不流行所致今且和其肝胃緩其腹痛然後再商消痞白芍丹皮茯苓牡蠣歸身陳皮麥仁川楝又溫膽湯案氣不攝血腹痛下墜崩漏不已其勢手棘炒熟地炙草木香醋炒升麻炒歸身於術黨參新絲棉黃耆茯苓牛角腮案産後營虛肝不疏泄面浮足腫少腹痞硬天癸衍期脈微細澀急當溫補氣血以調達肝氣黑逍遙散砂仁炒熟地炙甘草茯苓塊酒炒歸身炭於術柴胡加炮薑炭丹參香附案經事垂絶之年忽然崩中奇經受傷若不急補則恐其脫人參白芍牡蠣紫石英熟地阿膠龍骨歸身女貞淡貢菜案陽維為病苦寒熱陰維為病苦心痛熟地鹿角霜枸杞子潼沙苑歸身元武板用杜仲羊腰子煎湯代水附釋成方三方貞元飲加乾薑肉桂即理陰煎以此治肺腎虛寒飲泛者想有奇效達元飲用檳榔多厚朴草果芩知母菖蒲芍藥生甘草溫疫方中記勞哦達元因濕熱蘊結於膜原非芳香辛烈不能開其邪之鬱結故果檳蒲朴為必用之藥又恐燥烈傷津故加芍知母草以顧津液昏昏如憒者非此不可普濟回春散制川朴丁香煨木香炮附子法半夏木瓜廣藿香檀香制茅朮共為細末陰陽水煎透腿上青處揩之
